<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Storytime">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-touch-fullscreen" content="yes">
    <link rel="apple-touch-icon" href="icon-180.png">
    <style>body { -webkit-user-select: none; -webkit-touch-callout: none; overscroll-behavior: none; } .en-text, .zh-text, .vocab { -webkit-user-select: text; }</style>
    <title>🌟 Storytime Adventures - Complete Collection (200 Stories)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+SC:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Fredoka One', cursive; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; overflow-x: hidden; }
        .app { max-width: 900px; margin: 0 auto; padding: 10px; min-height: 100vh; }
        .header { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #FF6B6B, #4ECDC4, #FFE66D, #9B59B6); }
        .logo { font-size: 2em; color: #FF6B6B; text-shadow: 2px 2px 0px #FFE66D; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.9em; font-family: 'Noto Sans SC', sans-serif; }
        .nav-btn { background: linear-gradient(135deg, #FF6B6B, #FF8C42); border: none; border-radius: 50px; padding: 12px 25px; color: white; font-family: 'Fredoka One', cursive; font-size: 1.1em; cursor: pointer; box-shadow: 0 5px 15px rgba(255,107,107,0.4); transition: all 0.3s; margin: 5px; display: inline-flex; align-items: center; gap: 8px; }
        .nav-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 20px rgba(255,107,107,0.6); }
        .nav-btn.sec { background: linear-gradient(135deg, #4ECDC4, #4D96FF); box-shadow: 0 5px 15px rgba(78,205,196,0.4); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 10px; }
        .card { background: white; border-radius: 20px; padding: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: all 0.3s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px) rotate(2deg); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .card-img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #f0f0f0; }
        .card-title { font-size: 0.95em; color: #333; line-height: 1.3; }
        .card-zh { font-family: 'Noto Sans SC', sans-serif; font-size: 0.8em; color: #666; margin-top: 5px; }
        .prog-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: linear-gradient(90deg, #4ECDC4, #52B788); border-radius: 3px; transition: width 0.3s; }
        .reader { display: none; background: white; border-radius: 25px; padding: 20px; min-height: 70vh; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; }
        .reader.active { display: block; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .r-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 3px dashed #FFE66D; }
        .page { display: none; animation: pageFlip 0.6s; }
        .page.active { display: block; }
        @keyframes pageFlip { from { opacity: 0; transform: rotateY(-90deg); } to { opacity: 1; transform: rotateY(0); } }
        .page-img { width: 100%; height: 300px; margin: 20px 0; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); background: #f8f9fa; }
        .page-img img { width: 100%; height: 100%; object-fit: cover; }
        .page-content { background: linear-gradient(135deg, #fff9f0, #fff); border-radius: 20px; padding: 25px; margin: 15px 0; border: 3px solid #FFE66D; position: relative; }
        .page-content::before { content: '📖'; position: absolute; top: -15px; left: 20px; background: white; padding: 0 10px; font-size: 1.5em; }
        :root { --font-scale: 1; }
        .en-text { font-size: calc(1.5em * var(--font-scale)); color: #333; line-height: 1.8; margin-bottom: 15px; text-align: left; }
        .zh-text { font-family: 'Noto Sans SC', sans-serif; font-size: calc(1.3em * var(--font-scale)); color: #9B59B6; line-height: 2; padding-top: 15px; border-top: 2px dashed #ddd; text-align: left; }
        .font-controls { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; }
        .font-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #FFE66D; background: white; color: #FF6B6B; font-family: 'Fredoka One', cursive; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .font-btn:hover { background: #FFE66D; transform: scale(1.1); }
        .font-label { font-size: 0.85em; color: #999; min-width: 30px; text-align: center; }
        .resume-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: center; }
        .resume-overlay.active { display: flex; }
        .resume-box { background: white; border-radius: 25px; padding: 35px 30px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideIn 0.3s; }
        .resume-box h3 { font-size: 1.6em; color: #FF6B6B; margin-bottom: 10px; }
        .resume-box p { font-family: 'Noto Sans SC', sans-serif; color: #666; font-size: 1em; margin-bottom: 25px; line-height: 1.6; }
        .resume-btns { display: flex; flex-direction: column; gap: 10px; }
        .vocab { background: linear-gradient(135deg, #FFE66D, #FFD93D); padding: 2px 8px; border-radius: 8px; display: inline-block; margin: 2px; cursor: pointer; transition: all 0.3s; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .vocab:hover { transform: scale(1.1) rotate(-2deg); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .vocab::after { content: attr(data-zh); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #9B59B6; color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.6em; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.3s; font-family: 'Noto Sans SC', sans-serif; z-index: 10; }
        .vocab:hover::after { opacity: 1; bottom: calc(100% + 5px); }
        .page-num { text-align: center; color: #999; font-size: 0.9em; margin-top: 15px; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: linear-gradient(135deg, #4ECDC4, #4D96FF); color: white; font-size: 1.8em; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .ctrl-btn:active { transform: scale(0.95); }
        .ctrl-btn.big { width: 80px; height: 80px; font-size: 2.2em; background: linear-gradient(135deg, #FF6B6B, #FF8C42); }
        .complete { display: none; text-align: center; padding: 40px 20px; animation: celebrate 0.8s; }
        .complete.active { display: block; }
        @keyframes celebrate { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .trophy { font-size: 6em; margin-bottom: 20px; animation: trophyBounce 1s infinite; }
        @keyframes trophyBounce { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        .comp-title { font-size: 2em; color: #FF6B6B; margin-bottom: 15px; }
        .comp-msg { font-size: 1.3em; color: #666; margin-bottom: 30px; font-family: 'Noto Sans SC', sans-serif; }
        .sound-ind { position: fixed; bottom: 20px; right: 20px; background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5em; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 100; transition: all 0.3s; }
        .sound-ind.muted { opacity: 0.5; }
        .read-prog { position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(90deg, #FF6B6B, #FFE66D); z-index: 1000; transition: width 0.3s; }
        .confetti { position: fixed; width: 10px; height: 10px; top: -10px; animation: confetti-fall 3s linear forwards; z-index: 999; }
        @keyframes confetti-fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } .en-text { font-size: 1.2em; } .zh-text { font-size: 1.1em; } .page-img { height: 200px; } }
    </style>
</head>
<body>
    <div class="read-prog" id="readProg"></div>
    <div class="app">
        <div class="header">
            <div class="logo">📚 Storytime Adventures 🌈</div>
            <div class="subtitle">故事时间大冒险 - Complete Collection (200 Stories)</div>
            <div style="margin-top: 10px;">
                <button class="nav-btn" onclick="showGrid()">📖 All Stories 全部故事</button>
                <button class="nav-btn sec" onclick="showFavs()">⭐ Favourites 收藏</button>
            </div>
        </div>
        <div id="grid" class="grid"></div>
        <div id="reader" class="reader">
            <div class="r-header">
                <h2 id="rTitle" style="color: #FF6B6B; font-size: 1.8em; margin-bottom: 5px;"></h2>
                <div id="rTitleZh" style="font-family: 'Noto Sans SC', sans-serif; color: #666; font-size: 1.2em;"></div>
            </div>
            <div id="pages"></div>
            <div class="complete" id="complete">
                <div class="trophy">🏆</div>
                <div class="comp-title">Well Done! 太棒了!</div>
                <div class="comp-msg">You finished the story!<br>你读完了整个故事!</div>
                <button class="nav-btn big" onclick="createConfetti(); showGrid();" style="margin-top: 20px;">🌟 Read Another 再读一个</button>
            </div>
            <div class="controls">
                <button class="ctrl-btn" onclick="prev()">⬅️</button>
                <button class="ctrl-btn big" onclick="read()">🔊</button>
                <button class="ctrl-btn" onclick="next()">➡️</button>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="nav-btn sec" onclick="toggleFav()"><span id="favIcon">⭐</span> <span id="favText">Add to Favourites 收藏</span></button>
                <button class="nav-btn" onclick="showGrid()" style="margin-left: 10px;">🏠 Back 返回</button>
            </div>
            <div class="font-controls">
                <button class="font-btn" onclick="changeFont(-1)" title="Smaller">A−</button>
                <span class="font-label" id="fontLabel">Aa</span>
                <button class="font-btn" onclick="changeFont(1)" title="Larger">A+</button>
            </div>
            <div class="page-num" id="pageNum"></div>
        </div>
    </div>
    <div class="sound-ind" id="soundToggle" onclick="toggleSound()">🔊</div>

    <div class="resume-overlay" id="resumeOverlay">
        <div class="resume-box">
            <h3>📖 Welcome Back!</h3>
            <p id="resumeMsg"></p>
            <div class="resume-btns">
                <button class="nav-btn" style="width:100%;justify-content:center;" onclick="resumeStory()">▶️ Continue 继续</button>
                <button class="nav-btn sec" style="width:100%;justify-content:center;" onclick="startFromBeginning()">🔄 Start Over 从头开始</button>
            </div>
        </div>
    </div>

    <script>
        const stories = [
  {
    "id": 1,
    "t": "The Three Little Pigs",
    "c": "三只小猪",
    "img": "pig house straw wood brick",
    "pages": [
      {
        "e": "Once upon a time, there lived <span class='vocab' data-zh='三'>three</span> little <span class='vocab' data-zh='猪'>pigs</span> with their mother in a cozy cottage.",
        "c": "从前，有三只小猪和他们的妈妈住在一座舒适的农舍里。",
        "img": "three little pigs with mother in cottage"
      },
      {
        "e": "One day, Mother Pig said, \"You are old enough to build your own houses now.\"",
        "c": "一天，猪妈妈说：\"你们已经长大了，可以建造自己的房子了。\"",
        "img": "mother pig talking to three little pigs"
      },
      {
        "e": "The first little pig met a man carrying <span class='vocab' data-zh='稻草'>straw</span>. \"Please give me some straw to build my house,\" he said.",
        "c": "第一只小猪遇到一个扛着稻草的人。\"请给我一些稻草来建造我的房子，\"他说。",
        "img": "pig getting straw from farmer"
      },
      {
        "e": "He built his house quickly with straw. It only took one day! \"Now I can play!\" he said happily.",
        "c": "他很快用稻草建造了他的房子。只花了一天！\"现在我可以玩了！\"他高兴地说。",
        "img": "pig building straw house quickly"
      },
      {
        "e": "The second pig met a man with <span class='vocab' data-zh='木头'>sticks</span>. \"Please give me some sticks to build my house,\" he asked.",
        "c": "第二只小猪遇到一个拿着木棍的人。\"请给我一些木棍来建造我的房子，\"他请求道。",
        "img": "pig getting wooden sticks"
      },
      {
        "e": "He built his house with sticks in two days. \"This is stronger than straw!\" he said proudly.",
        "c": "他用了两天时间用木棍建造了他的房子。\"这比稻草更结实！\"他自豪地说。",
        "img": "pig building wooden stick house"
      },
      {
        "e": "The third pig met a man with <span class='vocab' data-zh='砖头'>bricks</span>. \"Please give me some bricks to build my house,\" he said wisely.",
        "c": "第三只小猪遇到一个带着砖头的人。\"请给我一些砖头来建造我的房子，\"他明智地说。",
        "img": "pig getting bricks from man"
      },
      {
        "e": "He worked hard for many days, laying each brick carefully. His brothers laughed, \"You work too hard!\"",
        "c": "他辛勤工作了很多天，仔细地砌每一块砖。他的哥哥们嘲笑他：\"你工作太辛苦了！\"",
        "img": "pig building brick house carefully"
      },
      {
        "e": "A <span class='vocab' data-zh='大坏狼'>big bad wolf</span> came to the straw house. \"Little pig, little pig, let me come in!\" he called.",
        "c": "一只大坏狼来到了稻草房子。\"小猪，小猪，让我进来！\"他喊道。",
        "img": "wolf at straw house door"
      },
      {
        "e": "\"Not by the hair of my chinny-chin-chin!\" cried the pig. The wolf huffed and puffed and BLEW the house down!",
        "c": "\"我绝不让你进来！\"小猪叫道。狼吹啊吹，把房子吹倒了！",
        "img": "wolf blowing down straw house"
      },
      {
        "e": "The first pig ran to the stick house. The wolf came and blew that house down too!",
        "c": "第一只小猪跑到了木棍房子。狼来了，把那个房子也吹倒了！",
        "img": "wolf blowing down wooden house"
      },
      {
        "e": "Both pigs ran to the brick house. The wolf huffed and puffed, but the brick house would NOT fall!",
        "c": "两只小猪跑到了砖房。狼吹啊吹，但砖房纹丝不动！",
        "img": "wolf trying to blow brick house"
      },
      {
        "e": "The wolf tried again and again. He blew until he was very tired, but the strong brick house stood firm.",
        "c": "狼试了一次又一次。他吹到非常累，但坚固的砖房屹立不倒。",
        "img": "exhausted wolf at brick house"
      },
      {
        "e": "The clever wolf climbed onto the roof to go down the chimney. But the pigs lit a fire below!",
        "c": "聪明的狼爬上屋顶要从烟囱下去。但小猪们在下面生了火！",
        "img": "wolf climbing on roof"
      },
      {
        "e": "SPLASH! The wolf fell into the pot of hot water! He ran away and never came back.",
        "c": "扑通！狼掉进了热水锅里！他跑掉了，再也没回来。",
        "img": "wolf falling into chimney pot"
      },
      {
        "e": "The three little pigs lived <span class='vocab' data-zh='快乐地'>happily</span> ever after in the strong brick house. They learned that hard work pays off!",
        "c": "三只小猪在坚固的砖房里快乐地生活着。他们明白了努力工作会有回报！",
        "img": "three pigs celebrating in brick house"
      }
    ]
  },
  {
    "id": 2,
    "t": "Little Red Riding Hood",
    "c": "小红帽",
    "img": "girl red hood basket forest",
    "pages": [
      {
        "e": "Once there was a sweet girl who wore a beautiful red <span class='vocab' data-zh='帽子'>hood</span>. Everyone called her Little Red Riding Hood.",
        "c": "从前有一个甜美的女孩，她戴着一顶美丽的红色帽子。大家都叫她小红帽。",
        "img": "girl wearing red riding hood cloak"
      },
      {
        "e": "One day, her mother said, \"Take this basket of food to Grandmother. She is not feeling well.\"",
        "c": "一天，她妈妈说：\"把这篮食物带给奶奶。她身体不舒服。\"",
        "img": "mother giving basket to girl"
      },
      {
        "e": "\"Stay on the path and don't talk to strangers,\" her mother warned. The girl promised to be careful.",
        "c": "\"走在路上，不要和陌生人说话，\"妈妈警告道。女孩答应会小心的。",
        "img": "mother warning girl at door"
      },
      {
        "e": "In the forest, a cunning <span class='vocab' data-zh='狼'>wolf</span> saw her. \"Where are you going, little girl?\" he asked slyly.",
        "c": "在森林里，一只狡猾的狼看到了她。\"你要去哪里，小女孩？\"他狡猾地问。",
        "img": "wolf approaching girl in forest"
      },
      {
        "e": "\"I'm going to Grandmother's house,\" she said innocently. The wolf got a wicked idea.",
        "c": "\"我要去奶奶家，\"她天真地说。狼有了一个邪恶的主意。",
        "img": "girl talking to wolf on path"
      },
      {
        "e": "The wolf ran ahead to Grandmother's house. He tricked her and swallowed her whole!",
        "c": "狼抢先跑到奶奶家。他骗了她，把她整个吞了下去！",
        "img": "wolf at grandmother cottage"
      },
      {
        "e": "The wolf put on Grandmother's nightgown and cap. He got into bed to wait for Little Red Riding Hood.",
        "c": "狼穿上了奶奶的睡衣和帽子。他躺在床上等待小红帽。",
        "img": "wolf in bed wearing nightgown"
      },
      {
        "e": "Little Red Riding Hood arrived. \"Grandmother, what big <span class='vocab' data-zh='耳朵'>ears</span> you have!\" she said.",
        "c": "小红帽到了。\"奶奶，你的耳朵好大啊！\"她说。",
        "img": "girl looking at wolf in bed"
      },
      {
        "e": "\"All the better to hear you with,\" said the wolf. \"But Grandmother, what big <span class='vocab' data-zh='眼睛'>eyes</span> you have!\"",
        "c": "\"为了更好地听你说话，\"狼说。\"但是奶奶，你的眼睛好大啊！\"",
        "img": "wolf showing big eyes"
      },
      {
        "e": "\"All the better to see you with,\" replied the wolf. \"But Grandmother, what big <span class='vocab' data-zh='牙齿'>teeth</span> you have!\"",
        "c": "\"为了更好地看你，\"狼回答。\"但是奶奶，你的牙齿好大啊！\"",
        "img": "wolf showing sharp teeth"
      },
      {
        "e": "\"All the better to eat you with!\" roared the wolf, jumping out of bed!",
        "c": "\"为了更好地吃掉你！\"狼咆哮着从床上跳起来！",
        "img": "wolf jumping out of bed"
      },
      {
        "e": "Just then, a brave woodcutter heard the screams. He rushed in with his axe!",
        "c": "就在这时，一位勇敢的樵夫听到了尖叫声。他拿着斧头冲了进来！",
        "img": "woodcutter bursting through door"
      },
      {
        "e": "The woodcutter chased the wolf and made him open his mouth. Out popped Grandmother, safe!",
        "c": "樵夫追赶狼，让他张开了嘴。奶奶安然无恙地跳了出来！",
        "img": "grandmother coming out safely"
      },
      {
        "e": "The wolf ran away into the forest. Little Red Riding Hood hugged her grandmother tightly.",
        "c": "狼逃进了森林。小红帽紧紧地拥抱了她的奶奶。",
        "img": "girl hugging grandmother happily"
      },
      {
        "e": "\"I will never talk to strangers again,\" promised Little Red Riding Hood. And she kept her promise!",
        "c": "\"我再也不会和陌生人说话了，\"小红帽保证道。她信守了诺言！",
        "img": "girl and grandmother together"
      }
    ]
  },
  {
    "id": 3,
    "t": "Goldilocks and Three Bears",
    "c": "金发姑娘和三只熊",
    "img": "blonde girl three bears cottage",
    "pages": [
      {
        "e": "In a forest cottage lived three bears: Papa Bear (big), Mama Bear (medium), and Baby Bear (small).",
        "c": "在森林小屋里住着三只熊：熊爸爸（大）、熊妈妈（中）和熊宝宝（小）。",
        "img": "three bears family in cottage"
      },

        let currentStory = null;
        let currentPage = 0;
        let soundEnabled = true;
        let favorites = JSON.parse(localStorage.getItem('favs') || '[]');
        const fontSteps = [0.75, 0.85, 1, 1.2, 1.4, 1.65];
        const fontLabels = ['XS', 'S', 'Aa', 'L', 'XL', 'XXL'];
        let fontIdx = parseInt(localStorage.getItem('fontIdx') || '2');
        let pendingResumeStory = null;

        function getImg(th, idx) {
            return `https://image.pollinations.ai/prompt/${encodeURIComponent('children book illustration, ' + th + ', bright colors, high quality, storybook style')}?width=600&height=400&nologo=true&seed=${idx}`;
        }

        function init() {
            showGrid();
            if(localStorage.getItem('sound') === 'false') {
                soundEnabled = false;
                document.getElementById('soundToggle').textContent = '🔇';
                document.getElementById('soundToggle').classList.add('muted');
            }
            applyFont();
        }

        function applyFont() {
            document.documentElement.style.setProperty('--font-scale', fontSteps[fontIdx]);
            const lbl = document.getElementById('fontLabel');
            if(lbl) lbl.textContent = fontLabels[fontIdx];
        }

        function changeFont(dir) {
            fontIdx = Math.max(0, Math.min(fontSteps.length - 1, fontIdx + dir));
            localStorage.setItem('fontIdx', fontIdx);
            applyFont();
        }

        function showGrid() {
            document.getElementById('grid').style.display = 'grid';
            document.getElementById('reader').classList.remove('active');
            document.getElementById('complete').classList.remove('active');
            renderGrid();
        }

        function renderGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            stories.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openStory(s.id);
                const prog = getProg(s.id);
                const isFav = favorites.includes(s.id);
                card.innerHTML = `
                    <img src="${getImg(s.img, 0)}" class="card-img" alt="${s.t}">
                    <div class="card-title">${s.t}</div>
                    <div class="card-zh">${s.c}</div>
                    <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
                    ${isFav ? '<div style="margin-top:5px;color:gold;">⭐</div>' : ''}
                `;
                g.appendChild(card);
            });
        }

        function getProg(id) {
            return parseInt(localStorage.getItem(`prog_${id}`) || 0);
        }

        function saveProg(id, page) {
            const s = stories.find(x => x.id === id);
            localStorage.setItem(`prog_${id}`, Math.round((page / s.pages.length) * 100));
            localStorage.setItem(`page_${id}`, page);
        }

        function openStory(id) {
            currentStory = stories.find(s => s.id === id);
            const savedPage = parseInt(localStorage.getItem(`page_${id}`) || '0');
            const completed = localStorage.getItem(`comp_${id}`) === 'true';

            // If there's meaningful progress (not page 0, not already completed), offer to resume
            if(savedPage > 0 && !completed) {
                pendingResumeStory = { id, savedPage };
                const msg = document.getElementById('resumeMsg');
                msg.innerHTML = `<strong>${currentStory.t}</strong><br>页 ${savedPage + 1} of ${currentStory.pages.length}<br><span style="font-size:0.85em;color:#aaa;">You were on page ${savedPage + 1}</span>`;
                document.getElementById('resumeOverlay').classList.add('active');
                return;
            }

            currentPage = 0;
            _launchReader();
        }

        function resumeStory() {
            document.getElementById('resumeOverlay').classList.remove('active');
            currentPage = pendingResumeStory.savedPage;
            pendingResumeStory = null;
            _launchReader();
        }

        function startFromBeginning() {
            document.getElementById('resumeOverlay').classList.remove('active');
            currentPage = 0;
            localStorage.removeItem(`comp_${currentStory.id}`);
            pendingResumeStory = null;
            _launchReader();
        }

        function _launchReader() {
            document.getElementById('grid').style.display = 'none';
            document.getElementById('reader').classList.add('active');
            document.getElementById('complete').classList.remove('active');
            document.getElementById('rTitle').textContent = currentStory.t;
            document.getElementById('rTitleZh').textContent = currentStory.c;
            updateFavBtn();
            applyFont();
            renderPages();
            updateNum();
            updateReadProg();
            if(soundEnabled) setTimeout(() => read(), 1000);
        }

        function updateFavBtn() {
            const isFav = favorites.includes(currentStory.id);
            document.getElementById('favIcon').textContent = isFav ? '💖' : '⭐';
            document.getElementById('favText').textContent = isFav ? 'Remove from Favourites 取消收藏' : 'Add to Favourites 收藏';
        }

        function renderPages() {
            const c = document.getElementById('pages');
            c.innerHTML = '';
            currentStory.pages.forEach((pg, idx) => {
                const div = document.createElement('div');
                div.className = `page ${idx === currentPage ? 'active' : ''}`;
                div.id = `p-${idx}`;
                div.innerHTML = `
                    <div class="page-img"><img src="${getImg(pg.img, idx)}" alt="illustration" onerror="this.src='https://via.placeholder.com/600x400?text=Story+Image'"></div>
                    <div class="page-content">
                        <div class="en-text">${pg.e}</div>
                        <div class="zh-text">${pg.c}</div>
                    </div>
                    <div style="text-align:right;padding:0 25px;"><span style="background:#FFE66D;padding:5px 10px;border-radius:15px;font-size:0.8em;">👆 Tap words!</span></div>
                `;
                c.appendChild(div);
            });
            setTimeout(() => {
                document.querySelectorAll('.vocab').forEach(v => {
                    v.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const zh = v.getAttribute('data-zh');
                        const en = v.textContent;
                        if(soundEnabled) speakSeq(en, zh);
                        v.style.transform = 'scale(1.3) rotate(5deg)';
                        setTimeout(() => v.style.transform = '', 300);
                    });
                });
            }, 100);
        }

        function next() {
            if(currentPage < currentStory.pages.length - 1) {
                document.getElementById(`p-${currentPage}`).classList.remove('active');
                currentPage++;
                document.getElementById(`p-${currentPage}`).classList.add('active');
                updateNum();
                updateReadProg();
                saveProg(currentStory.id, currentPage);
                if(soundEnabled) setTimeout(() => read(), 1000);
                if(currentPage === currentStory.pages.length - 1) setTimeout(() => showComplete(), 1000);
            }
        }

        function prev() {
            if(currentPage > 0) {
                document.getElementById(`p-${currentPage}`).classList.remove('active');
                currentPage--;
                document.getElementById(`p-${currentPage}`).classList.add('active');
                updateNum();
                updateReadProg();
                saveProg(currentStory.id, currentPage);
            }
        }

        function updateNum() {
            document.getElementById('pageNum').textContent = `Page ${currentPage + 1} of ${currentStory.pages.length} | 第${currentPage + 1}页，共${currentStory.pages.length}页`;
        }

        function updateReadProg() {
            document.getElementById('readProg').style.width = ((currentPage + 1) / currentStory.pages.length * 100) + '%';
        }

        function showComplete() {
            document.getElementById('complete').classList.add('active');
            createConfetti();
            localStorage.setItem(`comp_${currentStory.id}`, 'true');
        }

        function createConfetti() {
            const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#9B59B6','#FF8C42','#52B788'];
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.cssText = `position:fixed;width:10px;height:10px;top:-10px;left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'0'};animation:confetti-fall 3s linear forwards;z-index:999;`;
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 3000);
                }, i*50);
            }
        }

        function read() {
            if(!soundEnabled || !currentStory) return;
            const pg = currentStory.pages[currentPage];
            const text = pg.e.replace(/<[^>]*>/g, '');
            const zh = pg.c;
            speakSeq(text, zh);
        }

        function speakSeq(en, zh, cb) {
            if(!('speechSynthesis' in window)) { if(cb) cb(); return; }
            window.speechSynthesis.cancel();
            const enU = new SpeechSynthesisUtterance(en);
            const zhU = new SpeechSynthesisUtterance(zh);
            const voices = window.speechSynthesis.getVoices();
            enU.voice = voices.find(v => v.lang.includes('en-AU')) || voices.find(v => v.lang.includes('en-GB')) || voices[0];
            enU.rate = 0.85;
            enU.pitch = 1.1;
            zhU.voice = voices.find(v => v.lang.includes('zh-CN')) || voices.find(v => v.lang.includes('zh-TW')) || voices[0];
            zhU.rate = 0.8;
            zhU.pitch = 1.0;
            enU.onend = () => { setTimeout(() => { window.speechSynthesis.speak(zhU); }, 600); };
            zhU.onend = () => { if(cb) cb(); };
            zhU.onerror = () => { if(cb) cb(); };
            enU.onerror = () => { if(cb) cb(); };
            window.speechSynthesis.speak(enU);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const ind = document.getElementById('soundToggle');
            ind.textContent = soundEnabled ? '🔊' : '🔇';
            ind.classList.toggle('muted', !soundEnabled);
            localStorage.setItem('sound', soundEnabled);
            if(!soundEnabled) window.speechSynthesis.cancel();
        }

        function toggleFav() {
            if(!currentStory) return;
            const idx = favorites.indexOf(currentStory.id);
            if(idx > -1) favorites.splice(idx, 1);
            else favorites.push(currentStory.id);
            localStorage.setItem('favs', JSON.stringify(favorites));
            updateFavBtn();
        }

        function showFavs() {
            if(favorites.length === 0) { alert('No favourites yet! ⭐\n还没有收藏的故事！'); return; }
            const g = document.getElementById('grid');
            g.innerHTML = '<h2 style="grid-column:1/-1;text-align:center;color:white;margin:20px;">⭐ Favourite Stories 收藏的故事</h2>';
            stories.filter(s => favorites.includes(s.id)).forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openStory(s.id);
                card.innerHTML = `<img src="${getImg(s.img, 0)}" class="card-img"><div class="card-title">${s.t}</div><div class="card-zh">${s.c}</div>`;
                g.appendChild(card);
            });
            document.getElementById('grid').style.display = 'grid';
            document.getElementById('reader').classList.remove('active');
        }

        document.addEventListener('keydown', e => {
            if(!currentStory) return;
            if(e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
            else if(e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
            else if(e.key === 'Escape') showGrid();
        });

        let tStart = 0, tEnd = 0;
        document.addEventListener('touchstart', e => { tStart = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            tEnd = e.changedTouches[0].screenX;
            if(tEnd < tStart - 50) next();
            if(tEnd > tStart + 50) prev();
        });

        if(typeof speechSynthesis !== 'undefined') {
            speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
        }

        init();
    </script>
